name: CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      publish_docker:
        description: 'Publish Docker image to GHCR'
        required: true
        type: boolean
        default: true
      publish_release:
        description: 'Publish GitHub release'
        required: true
        type: boolean
        default: false
      version:
        description: 'Version tag for release (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review and prebuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Prebuild
        run: npm run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out
          if-no-files-found: error

  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: review
    if: github.event_name == 'workflow_dispatch' && inputs.publish_docker

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            ${{ inputs.version && format('type=raw,value={0}', inputs.version) || '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - review
      - docker
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release

    permissions:
      contents: write

    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out

      - name: Pack static site
        run: tar -czf starcdn-static-${{ inputs.version || github.sha }}.tar.gz -C out .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: starcdn-static-${{ inputs.version || github.sha }}.tar.gz
          tag_name: ${{ inputs.version || github.sha }}
          generate_release_notes: true
