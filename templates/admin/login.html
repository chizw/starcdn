<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarCDN Admin - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 1.8rem;
            color: #333;
        }
        .logo span {
            color: #667eea;
        }
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 0.95rem;
            color: #666;
            transition: all 0.2s;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a6fd6;
        }
        .btn-passkey {
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-passkey:hover {
            background: #16213e;
        }
        .error-msg {
            background: #fee;
            color: #c00;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Star<span>CDN</span> Admin</h1>
        </div>
        <div id="error" class="error-msg"></div>
        <div class="tabs">
            <button class="tab active" onclick="showTab('password')">密码登录</button>
            <button class="tab" onclick="showTab('passkey')">PASSKEY 登录</button>
        </div>
        <div id="password-panel" class="panel active">
            <form id="login-form" onsubmit="handlePasswordLogin(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
        </div>
        <div id="passkey-panel" class="panel">
            <button type="button" class="btn btn-passkey" onclick="handlePasskeyLogin()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                使用 PASSKEY 登录
            </button>
        </div>
    </div>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (tab === 'password') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('password-panel').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('passkey-panel').classList.add('active');
            }
            hideError();
        }
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        async function handlePasswordLogin(e) {
            e.preventDefault();
            hideError();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
            }
        }
        async function handlePasskeyLogin() {
            hideError();
            try {
                const beginRes = await fetch('/admin/api/passkey/login/begin');
                const assertion = await beginRes.json();
                if (!beginRes.ok) {
                    showError(assertion.error || '登录初始化失败');
                    return;
                }
                const publicKey = {
                    challenge: base64UrlToArrayBuffer(assertion.challenge),
                    allowCredentials: [],
                    userVerification: assertion.userVerification || 'preferred'
                };
                const credential = await navigator.credentials.get({ publicKey });
                const finishRes = await fetch('/admin/api/passkey/login/finish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: credential.id,
                        rawId: arrayBufferToBase64Url(credential.rawId),
                        type: credential.type,
                        response: {
                            clientDataJSON: arrayBufferToBase64Url(credential.response.clientDataJSON),
                            authenticatorData: arrayBufferToBase64Url(credential.response.authenticatorData),
                            signature: arrayBufferToBase64Url(credential.response.signature),
                            userHandle: credential.response.userHandle ? arrayBufferToBase64Url(credential.response.userHandle) : null
                        }
                    })
                });
                const data = await finishRes.json();
                if (finishRes.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    showError(data.error || 'PASSKEY 验证失败');
                }
            } catch (err) {
                showError('PASSKEY 登录失败: ' + err.message);
            }
        }
        function base64UrlToArrayBuffer(base64url) {
            const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
            const binary = atob(base64);
            const buffer = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                buffer[i] = binary.charCodeAt(i);
            }
            return buffer.buffer;
        }
        function arrayBufferToBase64Url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }
    </script>
</body>
</html>
