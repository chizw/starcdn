<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarCDN Admin - Ban Rules</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .navbar {
            background: #1a1a2e;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 1.25rem; }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .navbar a:hover { opacity: 1; }
        .navbar a.active { opacity: 1; border-bottom: 2px solid #667eea; }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .add-form {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }
        .add-form h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .add-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .add-btn:hover { background: #5a6fd6; }
        .rules-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .rules-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rules-header h2 { font-size: 1.1rem; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.875rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background: #fafafa;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
        }
        td { font-size: 0.9rem; color: #333; }
        .type-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .type-URL { background: #e3f2fd; color: #1565c0; }
        .type-package { background: #f3e5f5; color: #7b1fa2; }
        .delete-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .delete-btn:hover { background: #d32f2f; }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #999;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>StarCDN Admin</h1>
        <div>
            <a href="/admin/dashboard">仪表盘</a>
            <a href="/admin/bans" class="active">封禁规则</a>
            <a href="#" onclick="handleLogout()">退出</a>
        </div>
    </nav>
    <div class="container">
        <div class="add-form">
            <h2>添加封禁规则</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="pattern">匹配模式</label>
                    <input type="text" id="pattern" placeholder="/gh/... or /npm/...">
                </div>
                <div class="form-group">
                    <label for="type">类型</label>
                    <select id="type">
                        <option value="URL">URL</option>
                        <option value="package">package</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reason">原因</label>
                    <input type="text" id="reason" placeholder="封禁原因">
                </div>
                <button class="add-btn" onclick="addBanRule()">添加</button>
            </div>
        </div>
        <div class="rules-container">
            <div class="rules-header">
                <h2>封禁规则列表</h2>
                <button class="refresh-btn" style="background: #667eea; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;" onclick="loadRules()">刷新</button>
            </div>
            <div id="rules-body">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    <script>
        async function loadRules() {
            try {
                const res = await fetch('/admin/api/ban');
                const rules = await res.json();
                if (rules.length === 0) {
                    document.getElementById('rules-body').innerHTML = '<div class="empty-state">暂无封禁规则</div>';
                    return;
                }
                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>模式</th>
                                <th>类型</th>
                                <th>原因</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rules.map(r => `
                                <tr>
                                    <td>${r.id}</td>
                                    <td><code>${escapeHtml(r.pattern)}</code></td>
                                    <td><span class="type-badge type-${r.type}">${r.type}</span></td>
                                    <td>${escapeHtml(r.reason)}</td>
                                    <td>${new Date(r.created_at).toLocaleString('zh-CN')}</td>
                                    <td><button class="delete-btn" onclick="deleteRule(${r.id})">删除</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('rules-body').innerHTML = html;
            } catch (err) {
                document.getElementById('rules-body').innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        async function addBanRule() {
            const pattern = document.getElementById('pattern').value.trim();
            const type = document.getElementById('type').value;
            const reason = document.getElementById('reason').value.trim();
            if (!pattern) {
                alert('请输入匹配模式');
                return;
            }
            try {
                const res = await fetch('/admin/api/ban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pattern, type, reason })
                });
                if (res.ok) {
                    document.getElementById('pattern').value = '';
                    document.getElementById('reason').value = '';
                    loadRules();
                } else {
                    const data = await res.json();
                    alert(data.error || '添加失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        async function deleteRule(id) {
            if (!confirm('确定要删除此规则吗？')) return;
            try {
                const res = await fetch(`/admin/api/ban/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadRules();
                } else {
                    alert('删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        async function handleLogout() {
            await fetch('/admin/api/logout', { method: 'POST' });
            window.location.href = '/admin/login';
        }
        loadRules();
    </script>
</body>
</html>
