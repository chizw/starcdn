services:
  starcdn:
    image: ghcr.io/scfcn/starcdn:latest
    ports:
      - "2607:2607"
    env_file:
      - .env
    environment:
      STARCDN_ADDR: :2607
      STARCDN_CACHE_DIR: /app/cache
      STARCDN_DB_PATH: /app/data/starcdn.db
      STARCDN_STATIC_DIR: /app/out
      STARCDN_CACHE_TTL: ${STARCDN_CACHE_TTL:-168h}
      STARCDN_FLUSH_TOKEN: ${STARCDN_FLUSH_TOKEN:-}
    volumes:
      - starcdn-cache:/app/cache
      - starcdn-data:/app/data
    restart: unless-stopped

volumes:
  starcdn-cache:
  starcdn-data:
